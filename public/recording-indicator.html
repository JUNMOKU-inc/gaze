<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
    background: transparent;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
}
.indicator {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px 6px 10px;
    border-radius: 20px;
    background: rgba(20, 20, 20, 0.85);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    box-shadow: 0 4px 20px rgba(0,0,0,0.4), 0 0 0 0.5px rgba(255,255,255,0.06);
    animation: slide-down 300ms cubic-bezier(0.16, 1, 0.3, 1);
}
@keyframes slide-down {
    from { opacity: 0; transform: translateY(-8px); }
    to { opacity: 1; transform: translateY(0); }
}
.dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #ef4444;
    box-shadow: 0 0 6px rgba(239, 68, 68, 0.6);
    animation: pulse 1.5s ease-in-out infinite;
}
@keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
}
.label {
    font-size: 12px;
    font-weight: 600;
    color: rgba(255, 255, 255, 0.9);
    letter-spacing: 0.5px;
}
.time {
    font-size: 11px;
    font-weight: 500;
    color: rgba(255, 255, 255, 0.5);
    font-variant-numeric: tabular-nums;
    min-width: 28px;
}
</style>
</head>
<body>
<div class="indicator">
    <div class="dot"></div>
    <span class="label">REC</span>
    <span class="time" id="time">0:00</span>
</div>
<script>
var startTime = window.__GAZE_RECORDING_START__ || Date.now();
var timeEl = document.getElementById('time');
function update() {
    var elapsed = Math.floor((Date.now() - startTime) / 1000);
    var min = Math.floor(elapsed / 60);
    var sec = elapsed % 60;
    timeEl.textContent = min + ':' + (sec < 10 ? '0' : '') + sec;
}
update();
setInterval(update, 1000);
</script>
</body>
</html>
