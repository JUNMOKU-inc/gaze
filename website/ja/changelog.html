<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>更新履歴 — Gaze</title>
    <link rel="canonical" href="https://gaze.dev/ja/changelog" />
    <link rel="alternate" hreflang="en" href="https://gaze.dev/changelog" />
    <link rel="alternate" hreflang="ja" href="https://gaze.dev/ja/changelog" />
    <link rel="alternate" hreflang="x-default" href="https://gaze.dev/changelog" />
    <meta property="og:locale" content="ja_JP" />
    <meta property="og:locale:alternate" content="en_US" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #ffffff;
        --bg-secondary: #f8fafc;
        --text: #0f172a;
        --text-secondary: #475569;
        --text-tertiary: #64748b;
        --accent: #2563eb;
        --accent-light: #3b82f6;
        --border: #e2e8f0;
        --border-light: #cbd5e1;
        --radius-sm: 10px;
        --max-width: 1200px;
        --nav-height: 64px;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        font-family:
          "Inter",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          system-ui,
          sans-serif;
        background: var(--bg);
        color: var(--text);
        line-height: 1.7;
        -webkit-font-smoothing: antialiased;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      /* ========== Nav ========== */
      nav {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        height: var(--nav-height);
        background: rgba(255, 255, 255, 0.8);
        backdrop-filter: blur(16px) saturate(180%);
        -webkit-backdrop-filter: blur(16px) saturate(180%);
        border-bottom: 1px solid var(--border);
        z-index: 100;
        display: flex;
        align-items: center;
      }

      .nav-inner {
        display: flex;
        align-items: center;
        justify-content: space-between;
        width: 100%;
        max-width: var(--max-width);
        margin: 0 auto;
        padding: 0 32px;
      }

      .nav-logo {
        display: flex;
        align-items: center;
        gap: 10px;
        font-weight: 700;
        font-size: 1.125rem;
        letter-spacing: -0.02em;
        color: var(--text);
      }

      .nav-links {
        display: flex;
        align-items: center;
        gap: 32px;
        list-style: none;
      }

      .nav-links a {
        font-size: 0.875rem;
        color: var(--text-secondary);
        transition: color 0.2s;
      }

      .nav-links a:hover {
        color: var(--text);
      }

      .nav-cta {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 8px 16px;
        background: var(--accent);
        color: #fff;
        border-radius: 8px;
        font-size: 0.875rem;
        font-weight: 600;
        transition:
          transform 0.15s,
          box-shadow 0.15s,
          background 0.15s;
      }

      .nav-cta:hover {
        transform: scale(1.03);
        background: var(--accent-light);
        box-shadow: 0 4px 14px rgba(37, 99, 235, 0.3);
      }

      /* ========== Content ========== */
      .doc-content {
        max-width: 720px;
        margin: 0 auto;
        padding: 120px 24px 80px;
      }

      .doc-content h1 {
        font-size: 2rem;
        font-weight: 800;
        letter-spacing: -0.02em;
        margin-bottom: 48px;
      }

      .release {
        margin-bottom: 48px;
        padding-bottom: 48px;
        border-bottom: 1px solid var(--border);
      }

      .release:last-child {
        border-bottom: none;
        margin-bottom: 0;
        padding-bottom: 0;
      }

      .release-header {
        display: flex;
        align-items: baseline;
        gap: 16px;
        margin-bottom: 16px;
        flex-wrap: wrap;
      }

      .release-version {
        font-size: 1.25rem;
        font-weight: 700;
      }

      .release-date {
        font-size: 0.875rem;
        color: var(--text-tertiary);
      }

      .release-label {
        font-size: 0.75rem;
        font-weight: 600;
        color: var(--accent);
        background: rgba(37, 99, 235, 0.08);
        padding: 2px 10px;
        border-radius: 100px;
      }

      .release ul {
        padding-left: 24px;
        margin: 0;
      }

      .release li {
        font-size: 0.9375rem;
        color: var(--text-secondary);
        line-height: 1.8;
        margin-bottom: 4px;
      }

      /* ========== Footer ========== */
      footer {
        background: var(--bg-secondary);
        padding: 32px 0;
        border-top: 1px solid var(--border);
      }

      .footer-inner {
        max-width: var(--max-width);
        margin: 0 auto;
        padding: 0 32px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 16px;
      }

      .footer-logo {
        display: flex;
        align-items: center;
        gap: 10px;
        font-weight: 700;
        font-size: 1rem;
        color: var(--text);
      }

      .footer-links {
        display: flex;
        gap: 24px;
        list-style: none;
      }

      .footer-links a {
        font-size: 0.8125rem;
        color: var(--text-tertiary);
        transition: color 0.2s;
      }

      .footer-links a:hover {
        color: var(--text);
      }

      .footer-copy {
        font-size: 0.8125rem;
        color: var(--text-tertiary);
      }

      /* ========== Responsive ========== */
      @media (max-width: 768px) {
        .nav-links {
          display: none;
        }
        .nav-cta {
          display: none;
        }
        .doc-content {
          padding: 100px 16px 60px;
        }
        .footer-inner {
          flex-direction: column;
          text-align: center;
        }
      }
      .nav-lang {
        display: inline-flex;
        align-items: center;
        font-size: 0.8125rem;
        color: var(--text-tertiary);
        margin-right: 12px;
      }
      .nav-lang a,
      .nav-lang [aria-current="true"] {
        padding: 4px 8px;
        border-radius: 6px;
        white-space: nowrap;
      }
      .nav-lang a {
        transition: color 0.15s;
      }
      .nav-lang a:hover {
        color: var(--text);
      }
      .nav-lang [aria-current="true"] {
        color: var(--text);
        font-weight: 600;
      }
      .nav-lang .lang-sep {
        color: var(--border-light);
        padding: 0 2px;
        user-select: none;
      }
    </style>
  </head>
  <body>
